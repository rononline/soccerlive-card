# Example Lovelace dashboard for one team across multiple competitions.
# Replace entity IDs with the ones created in your Home Assistant instance.

title: Feyenoord
views:
  - title: Feyenoord
    path: feyenoord
    icon: mdi:soccer
    type: masonry
    cards:
      - type: custom:soccer-live-card
        card_type: diagnostics
        entity: sensor.soccer_live_ned_1_soccerlive_all_mixed_feyenoord_rotterdam
        skin: auto

      - type: custom:soccer-live-card
        card_type: team-competitions
        entity: sensor.soccer_live_ned_1_soccerlive_all_mixed_feyenoord_rotterdam
        skin: auto

      - type: custom:soccer-live-card
        card_type: team
        entity: sensor.soccer_live_ned_1_soccerlive_next_ned_1_feyenoord_rotterdam
        skin: auto
        show_event_toasts: true
        show_form_trend: true
        show_previous_matches: true

      - type: custom:soccer-live-card
        card_type: matches
        entity: sensor.soccer_live_ned_1_soccerlive_all_mixed_feyenoord_rotterdam
        skin: auto
        smart_order: true
        show_finished_matches: true
        max_events_visible: 6
        max_events_total: 50

      - type: custom:soccer-live-card
        card_type: countdown
        entity: sensor.soccer_live_ned_1_soccerlive_next_ned_1_feyenoord_rotterdam
        skin: auto

      # The Club card remains useful with basic Soccer Live club data. Rich
      # sections appear only when the selected sensor exposes their attributes.
      - type: custom:soccer-live-card
        card_type: club
        entity: sensor.soccer_live_ned_1_soccerlive_next_ned_1_feyenoord_rotterdam
        skin: auto
        show_matchday: true
        show_season_progress: true
        show_squad: true
        show_squad_analysis: true
        show_injuries: true
        show_availability: true
        show_prediction: true
        show_selection: true
        show_team_news: true
        show_club_records: true
        show_transfers: true
        show_data_quality: true
        show_automations: false
        collapse_sections: true
        dashboard_mode: false
        max_transfers: 12
