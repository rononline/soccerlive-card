name: Visual

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/visual/**'
      - 'playwright.config.mjs'
      - 'webpack.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/visual.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/visual/**'
      - 'playwright.config.mjs'
      - 'webpack.config.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:
    inputs:
      update:
        description: 'Regenerate baselines and upload them as an artifact (bootstrap Linux baselines)'
        type: boolean
        default: false

jobs:
  visual:
    runs-on: ubuntu-latest
    # Pin to the Playwright image matching the @playwright/test version, so
    # screenshots render consistently (browsers + fonts are baked in).
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - name: Run visual tests
        run: npx playwright test ${{ (github.event_name == 'workflow_dispatch' && inputs.update) && '--update-snapshots' || '' }}
      - name: Upload baselines / report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-results
          path: |
            test/visual/__snapshots__/**/*-linux.png
            playwright-report/**
            test-results/**
          if-no-files-found: ignore
          retention-days: 14
