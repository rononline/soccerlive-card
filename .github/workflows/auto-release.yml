name: Auto Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install deps
        if: steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Build bundle
        if: steps.check.outputs.exists == 'false'
        run: npm run build

      - name: Smoke test preview
        if: steps.check.outputs.exists == 'false'
        run: npm run smoke:preview

      - name: Build release notes from version-bump commit
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Find the commit that first introduced this version in package.json
          NOTE=$(git log --format="%H" -- package.json | while read sha; do
            prev=$(git show "${sha}^:package.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
            curr=$(git show "${sha}:package.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
            if [ "$curr" = "$VERSION" ] && [ "$prev" != "$VERSION" ]; then
              git log -1 --pretty=%B "$sha"
              break
            fi
          done)
          [ -z "$NOTE" ] && NOTE=$(git log -1 --pretty=%B)
          {
            echo 'notes<<EOF_NOTES'
            echo "$NOTE"
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: dist/soccer-live-card.bundle.js
          draft: false
          prerelease: false
