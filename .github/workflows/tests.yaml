name: Tests

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test:
    name: Unit + smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build bundle
        run: npm run build
      - name: Run tests (unit + i18n + preview smoke)
        run: npm test
