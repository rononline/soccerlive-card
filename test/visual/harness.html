<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; background: #0b0e17; }
    /* A neutral wrapper so element screenshots have consistent padding. A card
       gets a fixed dashboard-column width; the editor fills the viewport so the
       mobile vs desktop layouts actually differ. */
    #target { display: block; padding: 12px; box-sizing: border-box; }
    #target.card { width: 404px; }
    #target.editor, #target.minimal { width: 100%; }
    * { scrollbar-width: none; }
  </style>
  <!-- In real Home Assistant, <ha-card> is a defined element with
       `display: block`, so `background: var(--cl-bg)` fills the whole card.
       The harness has no HA, so without this stand-in ha-card would default to
       `display: inline` and only paint its background behind inline text —
       making light skins look like they had a dark/transparent body (dark team
       names on the page background) even though the real card is opaque. -->
  <script>
    if (!customElements.get('ha-card')) {
      customElements.define('ha-card', class extends HTMLElement {
        connectedCallback() { this.style.display = 'block'; }
      });
    }
  </script>
  <!-- Built bundle registers all soccer-live-* custom elements. -->
  <script src="../../dist/soccer-live-card.bundle.js"></script>
</head>
<body>
  <div id="target"></div>
  <script>
    // Compact but representative mock: a team with an upcoming match (prediction),
    // recent and upcoming fixtures, and team colours — enough for the visual cases.
    const attrs = {
      team_name: "Feyenoord",
      matches: [{
        state: "pre", home_team: "Feyenoord", away_team: "Rayo Vallecano",
        home_abbrev: "FEY", away_abbrev: "RAY", home_color: "#e50000", away_color: "#ffffff",
        home_score: "", away_score: "", date: "02-08-2026 15:00",
        prediction: {
          percent_home: 62, percent_draw: 24, percent_away: 14,
          advice: "Combo Winner : Feyenoord and +1.5 goals", winner_name: "Feyenoord",
          comparison: { form: { home: 58, away: 42 }, att: { home: 61, away: 39 }, def: { home: 50, away: 50 } },
          goals_home: "-2.5", goals_away: "-1.5", under_over: "-3.5",
        },
        odds: { home: 1.42, draw: 4.80, away: null, bookmaker_count: 9 },
      }],
      previous_matches: [
        { state: "post", home_team: "Feyenoord", away_team: "Charleroi", home_abbrev: "FEY", away_abbrev: "CHA",
          home_color: "#e50000", away_color: "#111111", home_score: "3", away_score: "1", date: "17-07-2026 18:00", league_abbrev: "FRIENDLY" },
        { state: "post", home_team: "Dordrecht", away_team: "Feyenoord", home_abbrev: "DOR", away_abbrev: "FEY",
          home_color: "#d81e05", away_color: "#e50000", home_score: "0", away_score: "6", date: "04-07-2026 18:00", league_abbrev: "FRIENDLY" },
      ],
      upcoming_matches: [
        { state: "pre", home_team: "Sparta Rotterdam", away_team: "Feyenoord", home_abbrev: "SPA", away_abbrev: "FEY",
          home_color: "#ffffff", away_color: "#e50000", date: "09-08-2026 12:15", league_abbrev: "ERE" },
        { state: "pre", home_team: "Feyenoord", away_team: "GO Ahead Eagles", home_abbrev: "FEY", away_abbrev: "GAE",
          home_color: "#e50000", away_color: "#ce1126", date: "16-08-2026 14:30", league_abbrev: "ERE" },
      ],
      league_name: "Eredivisie",
      standings: [
        { rank: 1, team_name: "PSV", wins: 3, draws: 0, losses: 0, points: "9", goal_difference: 7 },
        { rank: 2, team_name: "Feyenoord", wins: 2, draws: 1, losses: 0, points: "7", goal_difference: 5 },
        { rank: 3, team_name: "Ajax", wins: 2, draws: 0, losses: 1, points: "6", goal_difference: 2 },
        { rank: 4, team_name: "AZ Alkmaar", wins: 1, draws: 1, losses: 1, points: "4", goal_difference: -1 },
      ],
      standings_groups: [{
        name: "Eredivisie",
        standings: [
          { rank: 1, team_name: "PSV", wins: 3, draws: 0, losses: 0, points: "9", goal_difference: 7 },
          { rank: 2, team_name: "Feyenoord", wins: 2, draws: 1, losses: 0, points: "7", goal_difference: 5 },
          { rank: 3, team_name: "Ajax", wins: 2, draws: 0, losses: 1, points: "6", goal_difference: 2 },
          { rank: 4, team_name: "AZ Alkmaar", wins: 1, draws: 1, losses: 1, points: "4", goal_difference: -1 },
        ],
      }],
      scorers: [
        { rank: 1, player: "Santiago Gimenez", short_name: "S. Gimenez", team_name: "Feyenoord", goals: 18 },
        { rank: 2, player: "Luuk de Jong", short_name: "L. de Jong", team_name: "PSV", goals: 16 },
      ],
      articles: [
        { headline: "Feyenoord bereidt zich voor", description: "Voorbeschouwing op de volgende wedstrijd.", published: "2026-07-23T10:00:00Z", link: "#" },
        { headline: "Nieuwe trainingsweek begonnen", description: "Het laatste teamnieuws.", published: "2026-07-22T18:30:00Z", link: "#" },
      ],
      commentary: [
        { clock: "61", type: "goal", text: "Doelpunt voor Feyenoord", home_score: 2, away_score: 1 },
        { clock: "31", type: "yellow-card", text: "Gele kaart" },
      ],
      rounds: [{
        name: "Finale", size: 1, ties: [{
          team_a: { name: "Feyenoord", abbrev: "FEY" },
          team_b: { name: "Rayo Vallecano", abbrev: "RAY" },
          single: { state: "pre", home_team: "Feyenoord", away_team: "Rayo Vallecano", date: "02-08-2026 15:00" },
          completed: false,
        }],
      }],
      total_matches: 5,
      live_matches_count: 0,
      upcoming_matches_count: 3,
      finished_matches_count: 2,
      request_count: 4,
      last_successful_update: "23-07-2026 15:00",
      api_status: "ok",
      provider: "api_football",
      team_id: 209,
      club: {
        profile: { name: "Feyenoord", logo: "https://media.api-sports.io/football/teams/209.png", venue: "Stadion Feijenoord", venue_city: "Rotterdam", founded: 1908 },
        coach: "Giovanni van Bronckhorst",
        squad: [
          { id: 1, name: "Keeper", number: 1, position: "Goalkeeper", age: 30, market_value: 5000000, appearances: 20, rating: 7.1 },
          { id: 2, name: "Back", number: 4, position: "Defender", age: 22, market_value: 8000000, appearances: 18, goals: 1 },
          { id: 3, name: "Middenvelder", number: 8, position: "Midfielder", age: 25, market_value: 12000000, appearances: 21, goals: 4, assists: 6 },
          { id: 4, name: "Spits", number: 9, position: "Attacker", age: 27, market_value: 15000000, injured: true, goals: 12 },
        ],
        injuries: [{ player: "Spits", type: "Knee", expected_return: "August" }],
        transfers: [
          { player: "Nieuwe speler", player_id: 5, direction: "in", from: "Andere club", to: "Feyenoord", date: "2026-07-16", type: "Permanent", fee: 5000000 },
          { player: "Calvin Stengs", player_id: 6, direction: "out", from: "Feyenoord", to: "Free agent", date: "2026-07-22", type: "Contract" },
        ],
      },
      club_changes: [{ type: "transfer_added", player: "Nieuwe speler", direction: "in" }],
    };

    const params = new URLSearchParams(location.search);

    if (params.get("mode") === "matrix") {
      Object.assign(attrs.matches[0], {
        status: "Scheduled",
        league_name: "Eredivisie",
        venue: "Stadion Feijenoord",
        key_events: [
          { clock: "61", type: "goal", type_text: "Goal", team: "Feyenoord", athletes: ["Calvin Stengs"], scoring_play: true },
          { clock: "31", type: "yellow-card", type_text: "Yellow Card", team: "Rayo Vallecano", athletes: ["Florian Lejeune"] },
        ],
        lineup_home: [
          { name: "Justin Bijlow", short_name: "J. Bijlow", jersey: "1", position: "GK", starter: true },
          { name: "Givairo Read", short_name: "G. Read", jersey: "2", position: "RB", starter: true },
        ],
        lineup_away: [
          { name: "Augusto Batalla", short_name: "A. Batalla", jersey: "1", position: "GK", starter: true },
          { name: "Florian Lejeune", short_name: "F. Lejeune", jersey: "24", position: "CB", starter: true },
        ],
        formation_home: "4-3-3",
        formation_away: "4-2-3-1",
        home_statistics: { possessionPct: "58%", shotsTotal: "13", shotsOnTarget: "6" },
        away_statistics: { possessionPct: "42%", shotsTotal: "8", shotsOnTarget: "3" },
        head_to_head: [{ home_team: "Feyenoord", away_team: "Rayo Vallecano", home_score: "2", away_score: "1", date: "01-08-2025 15:00" }],
      });
    }

    // Variant tweaks to the mock for targeted cases.
    const variant = params.get("variant") || "";
    if (variant === "missing") {
      // No abbreviation and no colour -> falls back to the team name + accent tint.
      attrs.previous_matches[0] = { ...attrs.previous_matches[0], home_abbrev: "", home_color: undefined };
    } else if (variant === "longname") {
      attrs.previous_matches[0] = { ...attrs.previous_matches[0], home_abbrev: "Borussia Mönchengladbach" };
      attrs.upcoming_matches[0] = { ...attrs.upcoming_matches[0], away_abbrev: "Real Sociedad de Fútbol" };
    }
    attrs.friendly_name = "Feyenoord — next";

    // Inject a live match so the next variant can be checked to prefer it.
    if (params.has("live")) {
      attrs.matches = [{ state: "in", home_team: "Feyenoord", away_team: "Ajax", home_score: "1", away_score: "0" }, ...(attrs.matches || [])];
    }

    // Sync-status states: empty the match list and publish a lifecycle status so
    // the card's shared sync-status renderer shows the concrete text
    // (first fetch / rate limit / invalid key / provider down).
    if (params.has("sync_status")) {
      attrs.matches = [];
      attrs.previous_matches = [];
      attrs.upcoming_matches = [];
      attrs.sync_status = params.get("sync_status");
    }
    if (params.get("data") === "empty") {
      for (const key of ["matches", "previous_matches", "upcoming_matches", "standings", "standings_groups", "scorers", "articles", "commentary", "rounds"]) attrs[key] = [];
      attrs.club = {};
      attrs.total_matches = 0;
      attrs.live_matches_count = 0;
      attrs.upcoming_matches_count = 0;
      attrs.finished_matches_count = 0;
    } else if (params.get("data") === "partial") {
      attrs.matches = attrs.matches.map(({ prediction, odds, lineup_home, lineup_away, home_statistics, away_statistics, ...match }) => match);
      attrs.club = { profile: attrs.club.profile };
      attrs.commentary = [];
    }
    if (params.get("provider") === "fotmob") {
      attrs.provider = "fotmob";
      attrs.detail_capabilities = ["stats", "lineup", "h2h", "ratings"];
    }
    if (params.get("phase") === "live" && attrs.matches[0]) {
      Object.assign(attrs.matches[0], {
        state: "in", status: "In Progress", period: "2H", clock: "67",
        home_score: "2", away_score: "1",
      });
    } else if (params.get("phase") === "post" && attrs.matches[0]) {
      Object.assign(attrs.matches[0], {
        state: "post", status: "Full Time", period: "FT", clock: "",
        home_score: "3", away_score: "1",
      });
    }

    // Friendly branding: the provider hands out a generic FIFA competition logo;
    // the card must suppress it (fall back to the team logo / neutral icon). The
    // localised name "Oefenwedstrijd" exercises the name heuristic (no flag).
    const FIFA_LOGO = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23e535ab'/><text x='50' y='58' font-size='26' font-weight='bold' text-anchor='middle' fill='white'>FIFA</text></svg>";
    if (params.has("friendly")) {
      attrs.matches[0] = { ...attrs.matches[0], league_name: "Oefenwedstrijd" };
      attrs.league_name = "Oefenwedstrijd";
      attrs.league_info = [{ name: "Club Friendlies", abbreviation: "Oefenwedstrijd", logo_href: FIFA_LOGO }];
      attrs.team_logo = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%23e50000'/><text x='50' y='60' font-size='40' font-weight='bold' text-anchor='middle' fill='white'>F</text></svg>";
    }

    // Explicit Home Assistant theme variables so the ha appearance reflects a real
    // theme instead of only its fallback colours.
    if (params.has("ha_theme")) {
      const s = document.documentElement.style;
      s.setProperty("--ha-card-background", "#ffffff");
      s.setProperty("--card-background-color", "#ffffff");
      s.setProperty("--secondary-background-color", "#f5f5f5");
      s.setProperty("--primary-text-color", "#212121");
      s.setProperty("--secondary-text-color", "#727272");
      s.setProperty("--divider-color", "#e0e0e0");
      document.body.style.background = "#fafafa";
    }

    const cardDefaults = params.get("card_defaults");
    const entitiesParam = params.get("entities");
    const entities = entitiesParam ? JSON.parse(entitiesParam) : null;
    const primaryEntity = entities ? entities[0] : "sensor.preview_team";
    const stateObj = { state: "Feyenoord", attributes: { ...attrs } };
    if (cardDefaults) stateObj.attributes.card_defaults = JSON.parse(cardDefaults);

    const hass = {
      states: { [primaryEntity]: stateObj },
      language: params.get("lang") || "en",
      locale: { language: params.get("lang") || "en" },
    };

    // Build the config from URL params (only set the axes that are provided).
    const config = { show_previous_matches: true, show_form_trend: true };
    if (entities) config.entities = entities; else config.entity = "sensor.preview_team";
    for (const key of ["appearance", "palette", "skin", "my_team", "background_color", "text_color", "language", "variant", "text_size", "gradient_from", "gradient_to", "watermark_opacity", "section_order"]) {
      if (params.has(key)) config[key] = params.get(key);
    }
    if (params.has("dashboard_mode")) config.dashboard_mode = params.get("dashboard_mode") === "1";

    // A club-branded custom palette: red gradient + a faint crest watermark.
    if (params.has("branded")) {
      config.palette = "custom";
      config.accent_color = "#ff2222";
      config.text_color = "#ffffff";
      config.gradient_from = "#8e0e00";
      config.gradient_to = "#1f1c18";
      config.background_image = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='none' stroke='white' stroke-width='4'/><text x='50' y='66' font-size='60' text-anchor='middle' fill='white' font-family='serif'>F</text></svg>";
      config.watermark_opacity = 0.12;
    }

    const mode = params.get("mode") || "card";       // card | editor | minimal | multiteam | club | matrix
    if (mode === "matches") {
      Object.assign(attrs.matches[0], {
        league_name: "Club Friendlies", week_number: 1, venue: "Stadion Feijenoord",
        date_iso: new Date(Date.now() + ((2 * 24 + 22) * 60 + 38) * 60000).toISOString(),
        preview: { home_form: "WWDWW", away_form: "LDWLL", h2h_count: 5 },
        home_rank: 2, home_points: 7, away_rank: 11, away_points: 3,
        injuries_home: [{ player: "Spits", reason: "Knee" }],
        broadcasts: ["ESPN"],
        detail_capabilities: ["form", "h2h", "lineups"],
      });
    }
    document.getElementById("target").className = mode === "multiteam" ? "card" : mode;

    let tag, cfg;
    if (mode === "editor") {
      tag = "soccer-live-team-editor";
      cfg = { type: "custom:soccer-live-card", card_type: "team", ...config };
    } else if (mode === "minimal") {
      tag = "soccer-live-schedule";
      cfg = config;
    } else if (mode === "multiteam") {
      // One working sensor and one whose provider rejected the API key, so the
      // per-tile status (working match vs 🔑 auth failure) can be checked.
      tag = "soccer-live-multi-team";
      hass.states["sensor.broken_team"] = {
        state: "unknown",
        attributes: { team_name: "Ajax", matches: [], sync_status: "authentication_failed" },
      };
      cfg = { ...config, entities: [primaryEntity, "sensor.broken_team"] };
    } else if (mode === "club") {
      tag = "soccer-live-club";
      cfg = { ...config, squad_collapsed: false };
    } else if (mode === "matches") {
      tag = "soccer-live-matches";
      cfg = config;
    } else if (mode === "matrix") {
      const type = params.get("type") || "team";
      const tags = {
        team: "soccer-live-team", standings: "soccer-live-standings", matches: "soccer-live-matches",
        countdown: "soccer-live-countdown", news: "soccer-live-news", bracket: "soccer-live-bracket",
        "mini-standings": "soccer-live-mini-standings", scorers: "soccer-live-scorers",
        "multi-team": "soccer-live-multi-team", "team-competitions": "soccer-live-team-competitions",
        "match-center": "soccer-live-match-center", "team-form": "soccer-live-team-form",
        club: "soccer-live-club", diagnostics: "soccer-live-diagnostics", ticker: "soccer-live-ticker",
        lineup: "soccer-live-lineup", timeline: "soccer-live-timeline", minimal: "soccer-live-schedule",
      };
      tag = tags[type];
      cfg = { ...config, language: params.get("lang") || "nl", my_team: "Feyenoord" };
      if (type === "minimal") cfg.variant = "fixtures";
      if (type === "bracket") cfg.style = "list";
      if (type === "multi-team") cfg.entities = [primaryEntity];
    } else {
      tag = "soccer-live-team";
      cfg = config;
    }

    const el = document.createElement(tag);
    el.setConfig(cfg);
    el.hass = hass;
    document.getElementById("target").appendChild(el);

    // Signal readiness for the test runner once rendered.
    requestAnimationFrame(() => requestAnimationFrame(() => { document.body.dataset.ready = "1"; }));
  </script>
</body>
</html>
