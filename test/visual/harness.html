<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; background: #0b0e17; }
    /* A neutral wrapper so element screenshots have consistent padding. A card
       gets a fixed dashboard-column width; the editor fills the viewport so the
       mobile vs desktop layouts actually differ. */
    #target { display: block; padding: 12px; box-sizing: border-box; }
    #target.card { width: 404px; }
    #target.editor, #target.minimal { width: 100%; }
    * { scrollbar-width: none; }
  </style>
  <!-- Built bundle registers all soccer-live-* custom elements. -->
  <script src="../../dist/soccer-live-card.bundle.js"></script>
</head>
<body>
  <div id="target"></div>
  <script>
    // Compact but representative mock: a team with an upcoming match (prediction),
    // recent and upcoming fixtures, and team colours — enough for the visual cases.
    const attrs = {
      team_name: "Feyenoord",
      matches: [{
        state: "pre", home_team: "Feyenoord", away_team: "Rayo Vallecano",
        home_abbrev: "FEY", away_abbrev: "RAY", home_color: "#e50000", away_color: "#ffffff",
        home_score: "", away_score: "", date: "02-08-2026 15:00",
        prediction: {
          percent_home: 62, percent_draw: 24, percent_away: 14,
          advice: "Combo Winner : Feyenoord and +1.5 goals", winner_name: "Feyenoord",
          comparison: { form: { home: 58, away: 42 }, att: { home: 61, away: 39 }, def: { home: 50, away: 50 } },
          goals_home: "-2.5", goals_away: "-1.5", under_over: "-3.5",
        },
        odds: { home: 1.42, draw: 4.80, away: null, bookmaker_count: 9 },
      }],
      previous_matches: [
        { state: "post", home_team: "Feyenoord", away_team: "Charleroi", home_abbrev: "FEY", away_abbrev: "CHA",
          home_color: "#e50000", away_color: "#111111", home_score: "3", away_score: "1", date: "17-07-2026 18:00", league_abbrev: "FRIENDLY" },
        { state: "post", home_team: "Dordrecht", away_team: "Feyenoord", home_abbrev: "DOR", away_abbrev: "FEY",
          home_color: "#d81e05", away_color: "#e50000", home_score: "0", away_score: "6", date: "04-07-2026 18:00", league_abbrev: "FRIENDLY" },
      ],
      upcoming_matches: [
        { state: "pre", home_team: "Sparta Rotterdam", away_team: "Feyenoord", home_abbrev: "SPA", away_abbrev: "FEY",
          home_color: "#ffffff", away_color: "#e50000", date: "09-08-2026 12:15", league_abbrev: "ERE" },
        { state: "pre", home_team: "Feyenoord", away_team: "GO Ahead Eagles", home_abbrev: "FEY", away_abbrev: "GAE",
          home_color: "#e50000", away_color: "#ce1126", date: "16-08-2026 14:30", league_abbrev: "ERE" },
      ],
      league_name: "Eredivisie",
      standings: [
        { rank: 1, team_name: "PSV", wins: 3, draws: 0, losses: 0, points: "9", goal_difference: 7 },
        { rank: 2, team_name: "Feyenoord", wins: 2, draws: 1, losses: 0, points: "7", goal_difference: 5 },
        { rank: 3, team_name: "Ajax", wins: 2, draws: 0, losses: 1, points: "6", goal_difference: 2 },
        { rank: 4, team_name: "AZ Alkmaar", wins: 1, draws: 1, losses: 1, points: "4", goal_difference: -1 },
      ],
    };

    const params = new URLSearchParams(location.search);

    // Variant tweaks to the mock for targeted cases.
    const variant = params.get("variant") || "";
    if (variant === "missing") {
      // No abbreviation and no colour -> falls back to the team name + accent tint.
      attrs.previous_matches[0] = { ...attrs.previous_matches[0], home_abbrev: "", home_color: undefined };
    } else if (variant === "longname") {
      attrs.previous_matches[0] = { ...attrs.previous_matches[0], home_abbrev: "Borussia Mönchengladbach" };
      attrs.upcoming_matches[0] = { ...attrs.upcoming_matches[0], away_abbrev: "Real Sociedad de Fútbol" };
    }
    attrs.friendly_name = "Feyenoord — next";

    // Inject a live match so the next variant can be checked to prefer it.
    if (params.has("live")) {
      attrs.matches = [{ state: "in", home_team: "Feyenoord", away_team: "Ajax", home_score: "1", away_score: "0" }, ...(attrs.matches || [])];
    }

    // Explicit Home Assistant theme variables so the ha appearance reflects a real
    // theme instead of only its fallback colours.
    if (params.has("ha_theme")) {
      const s = document.documentElement.style;
      s.setProperty("--ha-card-background", "#ffffff");
      s.setProperty("--card-background-color", "#ffffff");
      s.setProperty("--secondary-background-color", "#f5f5f5");
      s.setProperty("--primary-text-color", "#212121");
      s.setProperty("--secondary-text-color", "#727272");
      s.setProperty("--divider-color", "#e0e0e0");
      document.body.style.background = "#fafafa";
    }

    const cardDefaults = params.get("card_defaults");
    const entitiesParam = params.get("entities");
    const entities = entitiesParam ? JSON.parse(entitiesParam) : null;
    const primaryEntity = entities ? entities[0] : "sensor.preview_team";
    const stateObj = { state: "Feyenoord", attributes: { ...attrs } };
    if (cardDefaults) stateObj.attributes.card_defaults = JSON.parse(cardDefaults);

    const hass = {
      states: { [primaryEntity]: stateObj },
      language: params.get("lang") || "en",
      locale: { language: params.get("lang") || "en" },
    };

    // Build the config from URL params (only set the axes that are provided).
    const config = { show_previous_matches: true, show_form_trend: true };
    if (entities) config.entities = entities; else config.entity = "sensor.preview_team";
    for (const key of ["appearance", "palette", "skin", "my_team", "background_color", "text_color", "language", "variant", "text_size"]) {
      if (params.has(key)) config[key] = params.get(key);
    }

    // A club-branded custom palette: red gradient + a faint crest watermark.
    if (params.has("branded")) {
      config.palette = "custom";
      config.accent_color = "#ff2222";
      config.text_color = "#ffffff";
      config.gradient_from = "#8e0e00";
      config.gradient_to = "#1f1c18";
      config.background_image = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='none' stroke='white' stroke-width='4'/><text x='50' y='66' font-size='60' text-anchor='middle' fill='white' font-family='serif'>F</text></svg>";
      config.watermark_opacity = 0.12;
    }

    const mode = params.get("mode") || "card";       // card | editor | minimal
    document.getElementById("target").className = mode;
    const tag = mode === "editor" ? "soccer-live-team-editor"
      : mode === "minimal" ? "soccer-live-schedule"
      : "soccer-live-team";
    const el = document.createElement(tag);
    el.setConfig(mode === "editor" ? { type: "custom:soccer-live-card", card_type: "team", ...config } : config);
    el.hass = hass;
    document.getElementById("target").appendChild(el);

    // Signal readiness for the test runner once rendered.
    requestAnimationFrame(() => requestAnimationFrame(() => { document.body.dataset.ready = "1"; }));
  </script>
</body>
</html>
